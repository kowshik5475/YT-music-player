<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Music Player</title>
    <!-- DNS pre-connect for faster external resource loading -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <link rel="dns-prefetch" href="https://invidious.privacydev.net">
    <link rel="dns-prefetch" href="https://inv.nadeko.net">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

    <!-- YouTube IFrame API — async so it doesn't block page render -->
    <script>
        (function() {
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            tag.async = true;
            var firstScript = document.getElementsByTagName('script')[0];
            firstScript.parentNode.insertBefore(tag, firstScript);
        })();
    </script>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
    <div class="header-left">
        <button id="sidebarToggle" class="sidebar-toggle-btn" title="Toggle sidebar">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="logo">
            <i class="fa-solid fa-music"></i>
            <h2>YT Music</h2>
        </div>
    </div>

    <div class="search-box">
        <button id="searchTypeToggle" title="Switch to YouTube search" class="search-mode-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <input type="text" id="searchInput" placeholder="Search library...">
    </div>

    <div class="header-actions">
        <button id="themeBtn" title="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</header>

<!-- ── LAYOUT ── -->
<div class="app-layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">

        <!-- Tab Bar -->
        <nav class="sidebar-tabs">
            <button class="stab active" data-tab="playlists" title="Playlists">
                <i class="fa-solid fa-layer-group"></i>
                <span>Playlists</span>
            </button>
            <button class="stab" data-tab="songs" title="Library">
                <i class="fa-solid fa-music"></i>
                <span>Library</span>
            </button>
            <button class="stab" data-tab="favorites" title="Favorites">
                <i class="fa-solid fa-heart"></i>
                <span>Favorites</span>
            </button>
            <button class="stab" data-tab="recent" title="Recently Played">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Recent</span>
            </button>
        </nav>

        <!-- Tab Panels -->
        <div class="sidebar-content">

            <!-- PLAYLISTS panel -->
            <div class="tab-panel active" id="tab-playlists">
                <div class="panel-header">
                    <span class="panel-title">My Playlists</span>
                    <button id="createPlaylistBtn" class="icon-action-btn" title="New playlist">
                        <i class="fa-solid fa-plus"></i> New
                    </button>
                </div>
                <div id="playlistsNav"></div>
            </div>

            <!-- LIBRARY (Songs) panel -->
            <div class="tab-panel" id="tab-songs">
                <div class="panel-header">
                    <span class="panel-title">Library <span id="libCountBadge" class="count-badge">0</span></span>
                    <button id="addSongBtn" class="icon-action-btn" title="Add song to library">
                        <i class="fa-solid fa-plus"></i> Add
                    </button>
                </div>
                <ul id="libraryList"></ul>
            </div>

            <!-- FAVORITES panel -->
            <div class="tab-panel" id="tab-favorites">
                <div class="panel-header">
                    <span class="panel-title">Favorites</span>
                </div>
                <ul id="favoritesList"></ul>
            </div>

            <!-- RECENTLY PLAYED panel -->
            <div class="tab-panel" id="tab-recent">
                <div class="panel-header">
                    <span class="panel-title">Recently Played</span>
                </div>
                <ul id="recentList"></ul>
            </div>

        </div>
    </aside>

    <!-- ── OVERLAY (mobile) ── -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ── PLAYER ── -->
    <main class="player-container">
        <div class="player-card">

            <div class="cover-wrapper">
                <img id="coverImage"
                    src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=800"
                    alt="Cover">
            </div>

            <div class="song-info">
                <h2 id="songTitle">Song Title</h2>
                <p id="artistName">Artist Name</p>
            </div>

            <div id="player"></div>

            <div class="controls">
                <button id="shuffleBtn" title="Shuffle: Off" aria-label="Shuffle">
                    <i class="fa-solid fa-shuffle"></i>
                </button>
                <button id="prevBtn" title="Previous" aria-label="Previous">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <button id="playBtn" title="Play / Pause" aria-label="Play or Pause" class="play-btn-main">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button id="nextBtn" title="Next" aria-label="Next">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
                <button id="repeatBtn" title="Repeat: Off" aria-label="Repeat">
                    <i class="fa-solid fa-repeat"></i>
                </button>
                <button id="favoriteBtn" title="Add to Favorites" aria-label="Favorite">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>

            <div class="progress-wrapper">
                <span id="currentTime">0:00</span>
                <input type="range" id="progressBar" value="0" min="0" max="100">
                <span id="duration">0:00</span>
            </div>

            <div class="volume-wrapper">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
            </div>

        </div>
    </main>

</div>

<!-- ── CREATE PLAYLIST MODAL ── -->
<div class="modal-overlay" id="createPlaylistModal" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-label="Create Playlist">

        <div class="modal-header">
            <div class="modal-icon"><i class="fa-solid fa-circle-plus"></i></div>
            <div>
                <h3 class="modal-title">New Playlist</h3>
                <p class="modal-subtitle">Organise your favourite tracks</p>
            </div>
            <button class="modal-close-btn" id="closeCreateModal" title="Cancel">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="modal-body">
            <div class="modal-field">
                <label for="plNameInput">Playlist name <span class="required">*</span></label>
                <input type="text" id="plNameInput" placeholder="e.g. Chill Vibes" maxlength="60" autocomplete="off">
                <span class="field-hint" id="plNameHint"></span>
            </div>
            <div class="modal-field">
                <label for="plDescInput">Description <span class="optional">(optional)</span></label>
                <textarea id="plDescInput" placeholder="What's this playlist about?" rows="2" maxlength="200"></textarea>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-secondary" id="cancelCreatePlaylist">Cancel</button>
            <button class="btn-primary" id="confirmCreatePlaylist">
                <i class="fa-solid fa-plus"></i> Create Playlist
            </button>
        </div>

    </div>
</div>

<!-- ── ADD SONG MODAL ── -->
<div class="modal-overlay" id="addSongModal" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-label="Add Song to Library">

        <div class="modal-header">
            <div class="modal-icon"><i class="fa-solid fa-music"></i></div>
            <div>
                <h3 class="modal-title">Add to Library</h3>
                <p class="modal-subtitle">Paste a YouTube link or enter details manually</p>
            </div>
            <button class="modal-close-btn" id="closeAddSongModal" title="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Source tabs -->
        <div class="add-song-tabs">
            <button class="add-song-tab active" data-source="url">
                <i class="fa-brands fa-youtube"></i> YouTube URL
            </button>
            <button class="add-song-tab" data-source="manual">
                <i class="fa-solid fa-pen"></i> Manual Entry
            </button>
        </div>

        <!-- YouTube URL panel -->
        <div class="add-song-panel active" id="panel-url">
            <div class="modal-body">
                <div class="modal-field">
                    <label for="ytUrlInput">YouTube URL or Video ID <span class="required">*</span></label>
                    <div class="url-input-row">
                        <input type="text" id="ytUrlInput" placeholder="https://youtube.com/watch?v=… or video ID" autocomplete="off">
                        <button class="btn-fetch" id="fetchInfoBtn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                    <span class="field-hint" id="ytUrlHint"></span>
                </div>

                <!-- Preview card (hidden until fetch) -->
                <div class="song-preview" id="songPreview" style="display:none">
                    <img id="previewThumb" src="" alt="" class="preview-thumb">
                    <div class="preview-info">
                        <div class="preview-title" id="previewTitle"></div>
                        <div class="preview-artist" id="previewArtist"></div>
                        <div class="preview-vid" id="previewVid"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelAddSong">Cancel</button>
                <button class="btn-primary" id="confirmAddSong" disabled>
                    <i class="fa-solid fa-plus"></i> Add to Library
                </button>
            </div>
        </div>

        <!-- Manual entry panel -->
        <div class="add-song-panel" id="panel-manual">
            <div class="modal-body">
                <div class="modal-field">
                    <label for="manualTitle">Song title <span class="required">*</span></label>
                    <input type="text" id="manualTitle" placeholder="e.g. Bohemian Rhapsody" maxlength="120" autocomplete="off">
                </div>
                <div class="modal-field">
                    <label for="manualArtist">Artist <span class="required">*</span></label>
                    <input type="text" id="manualArtist" placeholder="e.g. Queen" maxlength="100" autocomplete="off">
                </div>
                <div class="modal-field">
                    <label for="manualVideoId">YouTube Video ID <span class="required">*</span></label>
                    <input type="text" id="manualVideoId" placeholder="e.g. fJ9rUzIMcZQ  (11 characters)" maxlength="20" autocomplete="off">
                    <span class="field-hint" id="manualHint"></span>
                </div>
                <div class="modal-field">
                    <label for="manualCover">Cover image URL <span class="optional">(optional)</span></label>
                    <input type="text" id="manualCover" placeholder="https://… (leave blank to use YouTube thumbnail)">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelAddSongManual">Cancel</button>
                <button class="btn-primary" id="confirmAddSongManual">
                    <i class="fa-solid fa-plus"></i> Add to Library
                </button>
            </div>
        </div>

    </div>
</div>

<script src="js/storage.js"></script>
<script src="js/playlist.js"></script>
<script src="js/player.js"></script>
<script src="js/search.js"></script>
<script src="js/youtube-api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
