<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Music Player</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
    <div class="header-left">
        <button id="sidebarToggle" class="sidebar-toggle-btn" title="Toggle sidebar">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="logo">
            <i class="fa-solid fa-music"></i>
            <h2>YT Music</h2>
        </div>
    </div>

    <div class="search-box">
        <button id="searchTypeToggle" title="Switch to YouTube search" class="search-mode-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <input type="text" id="searchInput" placeholder="Search playlist...">
    </div>

    <div class="header-actions">
        <button id="themeBtn" title="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</header>

<!-- ── LAYOUT ── -->
<div class="app-layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">

        <!-- Sidebar Tab Bar -->
        <nav class="sidebar-tabs">
            <button class="stab active" data-tab="playlists" title="Playlists">
                <i class="fa-solid fa-layer-group"></i>
                <span>Playlists</span>
            </button>
            <button class="stab" data-tab="songs" title="Songs">
                <i class="fa-solid fa-music"></i>
                <span>Songs</span>
            </button>
            <button class="stab" data-tab="favorites" title="Favorites">
                <i class="fa-solid fa-heart"></i>
                <span>Favorites</span>
            </button>
            <button class="stab" data-tab="recent" title="Recently Played">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Recent</span>
            </button>
        </nav>

        <!-- Tab Panels -->
        <div class="sidebar-content">

            <!-- PLAYLISTS panel -->
            <div class="tab-panel active" id="tab-playlists">
                <div class="panel-header">
                    <span class="panel-title">My Playlists</span>
                    <button id="createPlaylistBtn" class="icon-action-btn" title="New playlist">
                        <i class="fa-solid fa-plus"></i> New
                    </button>
                </div>
                <div id="playlistsNav"></div>
            </div>

            <!-- SONGS panel -->
            <div class="tab-panel" id="tab-songs">
                <div class="panel-header">
                    <span class="panel-title" id="currentPlaylistLabel">My Playlist</span>
                </div>
                <ul id="playlist"></ul>
            </div>

            <!-- FAVORITES panel -->
            <div class="tab-panel" id="tab-favorites">
                <div class="panel-header">
                    <span class="panel-title">Favorites</span>
                </div>
                <ul id="favoritesList"></ul>
            </div>

            <!-- RECENTLY PLAYED panel -->
            <div class="tab-panel" id="tab-recent">
                <div class="panel-header">
                    <span class="panel-title">Recently Played</span>
                </div>
                <ul id="recentList"></ul>
            </div>

        </div>
    </aside>

    <!-- ── SIDEBAR OVERLAY (mobile) ── -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ── PLAYER ── -->
    <main class="player-container">
        <div class="player-card">

            <div class="cover-wrapper">
                <img id="coverImage"
                    src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=800"
                    alt="Cover">
            </div>

            <div class="song-info">
                <h2 id="songTitle">Song Title</h2>
                <p id="artistName">Artist Name</p>
            </div>

            <div id="player"></div>

            <div class="controls">
                <button id="shuffleBtn" title="Shuffle: Off" aria-label="Shuffle">
                    <i class="fa-solid fa-shuffle"></i>
                </button>
                <button id="prevBtn" title="Previous" aria-label="Previous">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <button id="playBtn" title="Play / Pause" aria-label="Play or Pause" class="play-btn-main">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button id="nextBtn" title="Next" aria-label="Next">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
                <button id="repeatBtn" title="Repeat: Off" aria-label="Repeat">
                    <i class="fa-solid fa-repeat"></i>
                </button>
                <button id="favoriteBtn" title="Add to Favorites" aria-label="Favorite">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>

            <div class="progress-wrapper">
                <span id="currentTime">0:00</span>
                <input type="range" id="progressBar" value="0" min="0" max="100">
                <span id="duration">0:00</span>
            </div>

            <div class="volume-wrapper">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
            </div>

        </div>
    </main>

</div>

<script src="js/storage.js"></script>
<script src="js/playlist.js"></script>
<script src="js/player.js"></script>
<script src="js/search.js"></script>
<script src="js/youtube-api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
